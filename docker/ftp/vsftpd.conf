# docker/ftp/vsftpd.conf
#
# Disposable integration-test target only. anonymous_enable=YES plus the
# banner text in banner.txt are the point: they make the daemon advertise
# anonymous access in its own greeting, which is exactly what
# plugins/ftp_anonymous_banner_hint.lua looks for (banner-text only -- no
# login is ever attempted by the scanner). No real credentials exist here.

listen=YES
listen_ipv6=NO

anonymous_enable=YES
local_enable=NO
write_enable=NO

banner_file=/etc/vsftpd_banner.txt

# seccomp filtering commonly makes vsftpd crash/OOPS inside containers
# (namespaced syscalls it does not expect); safe to disable here since this
# container is itself the isolated, disposable thing being contained.
seccomp_sandbox=NO

# Passive-mode data connections are irrelevant to this test target (no data
# transfer/login is ever attempted against it), left unconfigured
# deliberately.

pasv_enable=NO
