# docker/web/nginx.conf
#
# Two deliberately misconfigured server blocks on one disposable,
# internal-only nginx 1.18.0 (EOL, < 1.20 -- plugins/http_known_vulnerable_
# server.lua). Neither block sets any of the security-relevant response
# headers plugins/http_missing_*.lua look for -- that absence is the point,
# not an oversight. The self-signed/weak-key/weak-sig/weak-cipher/
# deprecated-protocol/not-yet-valid TLS scenarios all live on the
# docker/tls-legacy container instead (see its Dockerfile for why -- this
# nginx build's bundled OpenSSL, like every other actively-maintained
# OpenSSL package we tried, has RC4/DES/EXPORT ciphers compiled out and
# would refuse to even load a 1024-bit-key certificate).
#
#   :80  plaintext HTTP -- directory listing on, Server header discloses
#                          version, an insecure Set-Cookie, no CSP/XCTO/
#                          XFO headers.
#   :443 HTTPS           -- expired, self-signed, mismatched-CN cert
#                          (otherwise strong 2048-bit/SHA-256, so this port
#                          isolates the "expired" signal on its own), no
#                          HSTS header.

user nginx;
worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # server_tokens intentionally left at its default ("on"): that is what
    # makes the Server header disclose the full "nginx/1.18.0" version
    # string for plugins/http_server_version_disclosure.lua /
    # http_known_vulnerable_server.lua to observe.

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;

        # No index.html is shipped in this docroot (see Dockerfile), so
        # autoindex serves its default "Index of /" listing for GET /.
        autoindex on;

        # Deliberately insecure: no Secure/HttpOnly flags.
        add_header Set-Cookie "sessionid=dummy-test-session-12345; Path=/";

        location / {
        }
    }

    server {
        listen 443 ssl;
        server_name _;
        root /usr/share/nginx/html;
        autoindex on;

        ssl_certificate     /etc/nginx/certs/expired/server.crt;
        ssl_certificate_key /etc/nginx/certs/expired/server.key;

        ssl_protocols       TLSv1.2;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header Set-Cookie "sessionid=dummy-test-session-12345; Path=/";

        location / {
        }
    }
}
